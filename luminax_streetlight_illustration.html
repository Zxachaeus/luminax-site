
<style>
@keyframes bladeSpin { from{transform-origin:300px 115px;transform:rotate(0deg)} to{transform-origin:300px 115px;transform:rotate(360deg)} }
@keyframes ledGlow { 0%,100%{opacity:0.5} 50%{opacity:1} }
@keyframes floatUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes ringPulse { 0%,100%{opacity:0.15;r:70} 50%{opacity:0.4;r:85} }
@keyframes scanBeam { 0%{transform:translateY(-10px);opacity:0} 40%{opacity:0.7} 100%{transform:translateY(320px);opacity:0} }
@keyframes particleFade { 0%,100%{opacity:0} 50%{opacity:0.8} }
@keyframes chargePulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
.blades { animation: bladeSpin 6s linear infinite; transform-origin: 300px 115px; }
.led-beam { animation: ledGlow 2s ease-in-out infinite; }
.unit-float { animation: floatUp 5s ease-in-out infinite; }
.scan { animation: scanBeam 4s ease-in-out infinite; }
.p1 { animation: particleFade 3s ease-in-out infinite; }
.p2 { animation: particleFade 3s ease-in-out 0.6s infinite; }
.p3 { animation: particleFade 3s ease-in-out 1.2s infinite; }
.p4 { animation: particleFade 3s ease-in-out 1.8s infinite; }
.charge { animation: chargePulse 1.5s ease-in-out infinite; }
</style>
